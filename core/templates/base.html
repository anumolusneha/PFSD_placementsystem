<!DOCTYPE html>
<html>
<head>
    <title>Placement System</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }

        .navbar {
            background: #111827;
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: #2563eb;
        }

        .nav-links a {
            text-decoration: none;
            color: #f8fafc;
            margin-left: 30px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #2563eb;
        }

        .container {
            padding: 60px 80px;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .btn {
            background: #2563eb;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #2563eb;
        }

        .muted {
            color: #94a3b8;
        }

    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">Placement System</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/dashboard/">Dashboard</a>
        <a href="/login/">Login</a>
        <a href="/logout/">Logout</a>
    </div>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
