<!DOCTYPE html>
<html>
<head>
    <title>Apply Job</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            width: 50%;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 10px;
        }
        .btn {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #218838;
        }
        input[type="file"] {
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .back-link {
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Apply for {{ job.title }}</h2>
    <p><strong>Company:</strong> {{ job.company.username }}</p>
    <p><strong>Location:</strong> {{ job.location }}</p>
    <p><strong>Salary:</strong> {{ job.salary }}</p>
    <hr>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Upload Resume (PDF):</label><br>
        <input type="file" name="resume" required>

        <br>
        <button type="submit" class="btn">Submit Application</button>
    </form>

    <br>
    <a href="{% url 'job_list' %}" class="back-link">← Back to Jobs</a>

</div>

</body>
</html>
